<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortFlow | Nouveau dossier d'importation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/components/sidebar.css">
    <link rel="stylesheet" href="../../css/pages/dossier-form.css">
</head>
<body>
    <!-- Sidebar -->
   <div class="sidebar">
        <div class="logo-area">
            <br>
            <br>
            <h2>PortFlow</h2>
            <p>Gestion des surestaries</p>
        </div>
        
        <div class="user-info-sidebar">
            <div class="user-avatar" id="userAvatar">U</div>
            <div class="user-name" id="userName">Chargement...</div>
            <div class="user-role" id="userRole"></div>
        </div>
        
        <div class="nav-menu">
            <div class="nav-item" id="navDashboard">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </div>
            <div class="nav-item" id="navUsers">
                <i class="fas fa-users"></i>
                <span>Utilisateurs</span>
            </div>
            <div class="nav-item" id="navDossiers">
                <i class="fas fa-boxes"></i>
                <span>Dossiers</span>
            </div>
            <div class="nav-item" id="navArmateurs">
                <i class="fas fa-ship"></i>
                <span>Armateurs</span>
            </div>
            <div class="nav-item" id="navDocuments">
                <i class="fas fa-file-alt"></i>
                <span>Documents</span>
            </div>
            <div class="nav-item" id="navAlertes">
                <i class="fas fa-bell"></i>
                <span>Alertes</span>
            </div>
            <div class="nav-item" id="navRapports">
                <i class="fas fa-chart-line"></i>
                <span>Rapports</span>
            </div>
        </div>
        
        <div class="bottom-info">
            <i class="fas fa-shield-alt"></i> PortFlow v1.0<br>
            © 2024 - Tous droits réservés
        </div>
    </div>
    
    <!-- Contenu principal -->
    <div class="main-content">
        <div class="top-header">
            <div style="display: flex; align-items: center; gap: 16px;">
                <a href="list.html" style="color: #e74c3c; font-size: 1.5rem; text-decoration: none;" title="Retour à la liste">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1 class="page-title" id="pageTitle">Nouveau dossier d'importation</h1>
            </div>
        </div>
        
        <!-- Formulaire -->
        <div class="form-card">
            <form id="dossierForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="num_commande">N° Commande *</label>
                        <input type="text" id="num_commande" class="form-control" required placeholder="Ex: CMD-2024-001">
                    </div>
                    
                    <div class="form-group">
                        <label for="num_bl">N° BL / Connaissement *</label>
                        <input type="text" id="num_bl" class="form-control" required placeholder="Ex: BL2024001">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="fournisseur">Fournisseur *</label>
                        <input type="text" id="fournisseur" class="form-control" required placeholder="Nom du fournisseur">
                    </div>
                    
                    <div class="form-group">
                        <label for="armateur_id">Armateur *</label>
                        <select id="armateur_id" class="form-control" required>
                            <option value="">Sélectionner un armateur</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="numero_conteneur">N° Conteneur</label>
                        <input type="text" id="numero_conteneur" class="form-control" placeholder="Optionnel">
                    </div>
                    
                    <div class="form-group">
                        <label for="eta">ETA *</label>
                        <input type="date" id="eta" class="form-control" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="delai_franchise">Délai de franchise (jours)</label>
                        <input type="number" id="delai_franchise" class="form-control" value="11" min="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="statut">Statut</label>
                        <select id="statut" class="form-control">
                            <option value="en_cours">En cours</option>
                            <option value="arrive">Arrivé</option>
                            <option value="cloture">Clôturé</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="commentaire">Commentaire</label>
                    <textarea id="commentaire" class="form-control" rows="3" placeholder="Informations complémentaires..."></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="window.location.href='list.html'">Annuler</button>
                    <button type="submit" class="btn-save" id="submitBtn">
                        <i class="fas fa-save"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../js/config.js"></script>
    <script src="../../js/utils/storage.js"></script>
    <script src="../../js/api/client.js"></script>
    <script src="../../js/api/auth.js"></script>
    <script src="../../js/api/dossiers.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/utils/sidebar.js"></script>
    <script src="../../js/modules/dossiers/dossier-form.js"></script>
    <script src="../../js/api/referentiels.js"></script>
    
    <script>
        // Vérifier l'authentification
        if (!Auth.isAuthenticated()) {
            window.location.href = '../login.html';
        }
        
        // const isAdmin = Auth.isAdmin();
        
        // Afficher/masquer les menus selon le rôle
        const isAdmin = Auth.isAdmin();
        document.getElementById('navArmateurs').style.display = isAdmin ? 'flex' : 'none';
        document.getElementById('navUsers').style.display = isAdmin ? 'flex' : 'none';
        document.getElementById('navDocuments').style.display = isAdmin ? 'flex' : 'none';
        
        // Navigation sidebar
        const navDashboard = document.getElementById('navDashboard');
        if (navDashboard) {
            navDashboard.onclick = function(e) {
                e.preventDefault();
                window.location.href = isAdmin ? '../dashboard-admin.html' : '../dashboard-acheteur.html';
            };
        }
        
        const navDossiers = document.getElementById('navDossiers');
        if (navDossiers) {
            navDossiers.onclick = function(e) {
                e.preventDefault();
                window.location.href = 'list.html';
            };
        }
        
        const navDocuments = document.getElementById('navDocuments');
        if (navDocuments) {
            navDocuments.onclick = function(e) {
                e.preventDefault();
                window.location.href = '../documents/list.html';
            };
        }
        
        const navRapports = document.getElementById('navRapports');
        if (navRapports) {
            navRapports.onclick = function(e) {
                e.preventDefault();
                window.location.href = '../rapports/index.html';
            };
        }
        
        const navProfile = document.getElementById('navProfile');
        if (navProfile) {
            navProfile.onclick = function(e) {
                e.preventDefault();
                window.location.href = '../profile/index.html';
            };
        }
    </script>
</body>
</html>
