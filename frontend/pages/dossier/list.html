<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortFlow | Dossiers d'importation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/components/sidebar.css">
    <link rel="stylesheet" href="../../css/pages/dossiers-list.css">
</head>
<body>
    <!-- Sidebar -->
   <div class="sidebar">
        <div class="logo-area">
            <br>
            <br>
            <h2>PortFlow</h2>
            <p>Gestion des surestaries</p>
        </div>
        
        <div class="user-info-sidebar">
            <div class="user-avatar" id="userAvatar">U</div>
            <div class="user-name" id="userName">Chargement...</div>
            <div class="user-role" id="userRole"></div>
        </div>
        
        <div class="nav-menu">
            <div class="nav-item" id="navDashboard">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </div>
            <div class="nav-item" id="navUsers">
                <i class="fas fa-users"></i>
                <span>Utilisateurs</span>
            </div>
            <div class="nav-item active" id="navDossiers">
                <i class="fas fa-boxes"></i>
                <span>Dossiers</span>
            </div>
            <div class="nav-item" id="navArmateurs">
                <i class="fas fa-ship"></i>
                <span>Armateurs</span>
            </div>
            <div class="nav-item" id="navDocuments">
                <i class="fas fa-file-alt"></i>
                <span>Documents</span>
            </div>
            <div class="nav-item" id="navAlertes">
                <i class="fas fa-bell"></i>
                <span>Alertes</span>
            </div>
            <div class="nav-item" id="navRapports">
                <i class="fas fa-chart-line"></i>
                <span>Rapports</span>
            </div>
        </div>
        
        <div class="bottom-info">
            <i class="fas fa-shield-alt"></i> PortFlow v1.0<br>
            © 2024 - Tous droits réservés
        </div>
    </div>
    
    <!-- Contenu principal -->
    <div class="main-content">
        <div class="top-header">
            <h1 class="page-title">Dossiers d'importation</h1>
            <button class="btn-filter" onclick="Auth.logout()">
                <i class="fas fa-sign-out-alt btn-" ></i> Déconnexion
            </button>
        </div>
        
        <!-- Barre de filtres -->
        <div class="filters-bar">
            <div class="filter-group">
                <label><i class="fas fa-search"></i> Recherche</label>
                <input type="text" id="searchInput" placeholder="N° commande, BL, fournisseur...">
            </div>
            <div class="filter-group">
                <label><i class="fas fa-filter"></i> Statut</label>
                <select id="filterStatut">
                    <option value="">Tous</option>
                    <option value="en_cours">En cours</option>
                    <option value="arrive">Arrivé</option>
                    <option value="cloture">Clôturé</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-ship"></i> Armateur</label>
                <select id="filterArmateur">
                    <option value="">Tous</option>
                </select>
            </div>
            <div class="filter-actions">
                <button class="btn-filter" id="btnFilter">🔍 Filtrer</button>
                <button class="btn-reset" id="btnReset">🗑️ Réinitialiser</button>
            </div>
        </div>
        
        <!-- Liste des dossiers -->
        <div class="section-header">
            <h2><i class="fas fa-list"></i> Liste des dossiers</h2>
            <button class="btn-new" id="btnNew">
                <i class="fas fa-plus"></i> Nouveau dossier
            </button>
        </div>
        
        <div class="table-wrapper">
            <table class="dossiers-table">
                <thead>
                    <tr>
                        <th>N° Commande</th>
                        <th>Fournisseur</th>
                        <th>N° BL</th>
                        <th>Armateur</th>
                        <th>ETA</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="dossiersTableBody">
                    <tr><td colspan="7" class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../js/config.js"></script>
    <script src="../../js/utils/storage.js"></script>
    <script src="../../js/api/client.js"></script>
    <script src="../../js/api/auth.js"></script>
    <script src="../../js/api/dossiers.js"></script>
    <script src="../../js/utils/auth.js"></script>
    <script src="../../js/utils/sidebar.js"></script>
    <script src="../../js/modules/dossiers/dossiers-list.js"></script>
    
    <script>
        if (!Auth.isAuthenticated()) {
            window.location.href = '../login.html';
        }
        
        const isAdmin = Auth.isAdmin();
        document.getElementById('navArmateurs').style.display = isAdmin ? 'flex' : 'none';
        document.getElementById('navUsers').style.display = isAdmin ? 'flex' : 'none';
        document.getElementById('navDocuments').style.display = isAdmin ? 'flex' : 'none';
        
        // Navigation
        console.log('Script de navigation chargé');
        document.getElementById('navDashboard')?.addEventListener('click', () => {
            window.location.href = Auth.isAdmin() ? '../dashboard-admin.html' : '../dashboard-acheteur.html';
        });
        document.getElementById('navDocuments')?.addEventListener('click', () => {
            window.location.href = '../documents/list.html';
        });
        document.getElementById('navArmateurs')?.addEventListener('click', () => {
            window.location.href = '../armateurs/list.html';
        });
        document.getElementById('navRapports')?.addEventListener('click', () => {
            window.location.href = '../rapports/index.html';
        });
    </script>
</body>
</html>
