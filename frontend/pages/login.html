<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortFlow Monitor | Authentification</title>
    <!-- Font Awesome Icons (v6 free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/pages/login.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                    <div class="login-logo">
                        <i class="fas fa-ship"></i>
                        <h1>PORTFLOW</h1>
                    </div>
                    <p class="login-subtitle">Suivi des importations & prévention surestaries</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email"  class="form-control" name="email" required placeholder="exemple@portflow.com">
                </div>
                
                <div class="form-group">
                    <label for="mot_de_passe">Mot de passe</label>
                    <input type="password" id="mot_de_passe"  class="form-control" name="mot_de_passe" required>
                </div>
                
                <button type="submit"  id="loginBtn" class="btn btn-red btn-block">Se connecter</button>
            </form>
        
            <div class="login-footer">
                <p>Application - Gestion prédictive des surestaries</p>
            </div>
        </div>
    </div>

    <!-- 1. D'abord la configuration -->
<script src="../js/config.js"></script>

<!-- 2. Ensuite les utilitaires -->
<script src="../js/utils/storage.js"></script>
<script src="../js/utils/auth.js"></script>

<!-- 3. Puis les clients API -->
<script src="../js/api/client.js"></script>
<script src="../js/api/auth.js"></script>

<!-- 4. Enfin la logique de la page -->
<script src="../js/modules/auth/login.js"></script>
</body>
</html>
